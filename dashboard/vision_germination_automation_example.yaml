# Reference only: adapt the topic and payload to the future vision service.
# Expected MQTT message example:
# {"slot":"A1","germinated":true,"confidence":0.94,"observations":5}
#
# Design rules:
# - Only accept slot names A1-D6.
# - Require high confidence and several consistent observations.
# - Latch germination on; never automatically turn a seed off.
# - Reset the input_booleans only when beginning a new germination batch.

automation:
  - id: germination_vision_mark_seed_germinated
    alias: Germination vision - mark seed germinated
    description: Marks a seed helper on after a stable, high-confidence vision detection.
    mode: queued
    max: 24
    trigger:
      - platform: mqtt
        topic: germination/vision/detections
    condition:
      - condition: template
        value_template: >
          {{ trigger.payload_json.slot | default('')
             | regex_match('^[A-D][1-6]$') }}
      - condition: template
        value_template: >
          {{ trigger.payload_json.germinated | default(false) | bool }}
      - condition: template
        value_template: >
          {{ trigger.payload_json.confidence | default(0) | float >= 0.90 }}
      - condition: template
        value_template: >
          {{ trigger.payload_json.observations | default(0) | int >= 3 }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: >
            input_boolean.seed_{{ trigger.payload_json.slot | lower }}
