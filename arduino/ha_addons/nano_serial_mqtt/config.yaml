name: "Nano USB Sensor Gateway"
version: "1.1.0"
slug: "nano_serial_mqtt"
description: "Read a Nano 33 BLE Sense over USB serial and publish MQTT discovery sensors."
arch:
  - aarch64
  - amd64
init: false
uart: true
services:
  - mqtt:need
options:
  serial_port: "/dev/ttyACM0"
  install_firmware: false
schema:
  serial_port: "device(subsystem=tty)"
  install_firmware: "bool"
